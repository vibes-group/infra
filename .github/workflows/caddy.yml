name: Deploy caddy

on:
  push:
    branches: [master]
    paths:
      - 'caddy/**'
      - '.github/workflows/caddy.yml'
      - '.github/actions/setup-ssh/**'
  workflow_dispatch:

concurrency:
  group: deploy-caddy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          host-key: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Write caddy .env on host
        env:
          DEPLOY_HOST:        ${{ secrets.DEPLOY_HOST }}
          VOICE_HUB_HOST:     ${{ secrets.VOICE_HUB_HOST }}
          SOZVON_HUB_HOST:    ${{ secrets.SOZVON_HUB_HOST }}
          CURRENCY_HUB_HOST:  ${{ secrets.CURRENCY_HUB_HOST }}
          OTS_HOST:           ${{ secrets.OTS_HOST }}
        run: |
          set -euo pipefail
          umask 077
          trap 'rm -f .env.caddy' EXIT
          : > .env.caddy
          printf 'VOICE_HUB_HOST=%s\n'    "$VOICE_HUB_HOST"    >> .env.caddy
          printf 'SOZVON_HUB_HOST=%s\n'   "$SOZVON_HUB_HOST"   >> .env.caddy
          printf 'CURRENCY_HUB_HOST=%s\n' "$CURRENCY_HUB_HOST" >> .env.caddy
          printf 'OTS_HOST=%s\n'          "$OTS_HOST"          >> .env.caddy
          ssh "deploy@$DEPLOY_HOST" 'mkdir -p /opt/vibes/caddy'
          scp .env.caddy "deploy@$DEPLOY_HOST:/opt/vibes/caddy/.env.tmp"
          ssh "deploy@$DEPLOY_HOST" '
            set -e
            chmod 600 /opt/vibes/caddy/.env.tmp
            mv -f /opt/vibes/caddy/.env.tmp /opt/vibes/caddy/.env
          '

      - name: Validate and install compose + Caddyfile
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          scp caddy/compose.yml "deploy@$DEPLOY_HOST:/opt/vibes/caddy/compose.yml.tmp"
          scp caddy/Caddyfile   "deploy@$DEPLOY_HOST:/opt/vibes/caddy/Caddyfile.tmp"
          ssh "deploy@$DEPLOY_HOST" bash -s <<'EOF'
            set -euo pipefail
            cd /opt/vibes/caddy
            trap 'rm -f compose.yml.tmp Caddyfile.tmp' EXIT
            exec 9>/opt/vibes/.docker-deploy.lock
            flock -x 9
            docker compose -f compose.yml.tmp config --quiet
            image=$(docker compose -f compose.yml.tmp config --images | head -n 1)
            docker run --rm --env-file .env \
              -v "$PWD/Caddyfile.tmp:/etc/caddy/Caddyfile:ro" \
              "$image" caddy validate --config /etc/caddy/Caddyfile
            mv -f compose.yml.tmp compose.yml
            mv -f Caddyfile.tmp Caddyfile
            trap - EXIT
          EOF

      - name: Up + reload
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        # The server-side lock serializes Docker mutations across workflows from
        # different repositories. --wait keeps reload behind Caddy's healthcheck.
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" bash -s <<'EOF'
            set -euo pipefail
            exec 9>/opt/vibes/.docker-deploy.lock
            flock -x 9
            cd /opt/vibes/caddy
            docker compose up -d --remove-orphans --wait
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile
          EOF
