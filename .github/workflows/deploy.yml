name: Deploy app

# Reusable. Assumes .env уже на хосте (написан write-env composite в caller).

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
        description: "App slug. Must match apps/<app>/compose.yml."
    secrets:
      DEPLOY_HOST:     { required: true }
      DEPLOY_SSH_KEY:  { required: true }
      DEPLOY_HOST_KEY: { required: true }

concurrency:
  group: deploy-${{ inputs.app }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: vibes-group/infra
          ref: master

      - name: Validate app slug
        env:
          APP: ${{ inputs.app }}
        run: |
          set -euo pipefail
          case "$APP" in
            *[!a-z0-9-]*|""|-*|*-)
              echo "invalid app slug: $APP" >&2
              exit 1
              ;;
          esac
          test -f "apps/$APP/compose.yml"

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          host-key: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Validate and install compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APP:         ${{ inputs.app }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" "mkdir -p /opt/vibes/$APP"
          scp "apps/$APP/compose.yml" "deploy@$DEPLOY_HOST:/opt/vibes/$APP/compose.yml.tmp"
          ssh "deploy@$DEPLOY_HOST" APP="$APP" bash -s <<'EOF'
            set -euo pipefail
            cd "/opt/vibes/$APP"
            trap 'rm -f compose.yml.tmp' EXIT
            docker compose -f compose.yml.tmp config --quiet
            mv -f compose.yml.tmp compose.yml
            trap - EXIT
          EOF

      - name: Pull and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APP:         ${{ inputs.app }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" APP="$APP" bash -s <<'EOF'
            set -euo pipefail
            exec 9>/opt/vibes/.docker-deploy.lock
            flock -x 9
            cd "/opt/vibes/$APP"
            docker compose pull
            docker compose up -d --remove-orphans
          EOF

      - name: Health poll
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APP:         ${{ inputs.app }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" APP="$APP" bash -s <<'EOF'
            set -euo pipefail
            cd "/opt/vibes/$APP"
            for i in $(seq 1 30); do
              status=$(docker compose ps "$APP-app" --format "{{.Health}}")
              if [ "$status" = "healthy" ]; then
                echo "app healthy on attempt $i"
                exit 0
              fi
              echo "attempt $i: status=$status, retrying in 2s..."
              sleep 2
            done
            echo "app never reported healthy" >&2
            docker compose ps
            docker compose logs --tail 80 >&2
            exit 1
          EOF

      - name: Prune unused images
        continue-on-error: true
        uses: ./.github/actions/prune-images
        with:
          deploy-host: ${{ secrets.DEPLOY_HOST }}
