name: Deploy app

# Reusable. Assumes .env уже на хосте (написан write-env composite в caller).

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
        description: "App slug. Must match apps/<app>/compose.yml."
      image_tag:
        required: true
        type: string
        description: "Image tag (for logs/concurrency only; .env on host carries actual IMAGE_TAG)."
    secrets:
      DEPLOY_HOST:     { required: true }
      DEPLOY_SSH_KEY:  { required: true }
      DEPLOY_HOST_KEY: { required: true }

concurrency:
  group: deploy-${{ inputs.app }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: vibes-group/infra
          ref: master

      - name: Validate app slug
        env:
          APP: ${{ inputs.app }}
        run: |
          set -euo pipefail
          case "$APP" in
            *[!a-z0-9-]*|""|-*|*-)
              echo "invalid app slug: $APP" >&2
              exit 1
              ;;
          esac
          test -f "apps/$APP/compose.yml"

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY"  > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_HOST_KEY" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts

      - name: Sync compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APP:         ${{ inputs.app }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" "mkdir -p /opt/vibes/$APP"
          scp "apps/$APP/compose.yml" "deploy@$DEPLOY_HOST:/opt/vibes/$APP/compose.yml"

      - name: Pull and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APP:         ${{ inputs.app }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" APP="$APP" bash -s <<'EOF'
            set -euo pipefail
            cd "/opt/vibes/$APP"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af --filter "until=168h"
          EOF

      - name: Health poll
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APP:         ${{ inputs.app }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" APP="$APP" bash -s <<'EOF'
            set -euo pipefail
            cd "/opt/vibes/$APP"
            for i in $(seq 1 30); do
              status=$(docker compose ps "$APP-app" --format "{{.Health}}")
              if [ "$status" = "healthy" ]; then
                echo "app healthy on attempt $i"
                exit 0
              fi
              echo "attempt $i: status=$status, retrying in 2s..."
              sleep 2
            done
            echo "app never reported healthy" >&2
            docker compose ps
            docker compose logs --tail 80 >&2
            exit 1
          EOF
