name: Deploy ots

# Third-party image (ghcr.io/luzifer/ots), deployed straight from infra like
# caddy — no build, no app repo, no .env. Self-contained (not the reusable
# deploy.yml, which health-polls a container healthcheck the scratch OTS image
# can't provide).

on:
  push:
    branches: [master]
    paths:
      - 'apps/ots/**'
      - '.github/workflows/ots.yml'
      - '.github/actions/setup-ssh/**'
      - '.github/actions/prune-images/**'
  workflow_dispatch:

concurrency:
  group: deploy-ots
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          host-key: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Validate and install compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" 'mkdir -p /opt/vibes/ots'
          scp apps/ots/compose.yml "deploy@$DEPLOY_HOST:/opt/vibes/ots/compose.yml.tmp"
          ssh "deploy@$DEPLOY_HOST" bash -s <<'EOF'
            set -euo pipefail
            cd /opt/vibes/ots
            trap 'rm -f compose.yml.tmp' EXIT
            docker compose -f compose.yml.tmp config --quiet
            mv -f compose.yml.tmp compose.yml
            trap - EXIT
          EOF

      - name: Pull and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" bash -s <<'EOF'
            set -euo pipefail
            exec 9>/opt/vibes/.docker-deploy.lock
            flock -x 9
            cd /opt/vibes/ots
            docker compose pull
            docker compose up -d --remove-orphans
          EOF

      - name: Health poll
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        # Functional probe: the scratch OTS image has no shell for a container
        # healthcheck, so hit it over vibes_net from a throwaway busybox.
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" bash -s <<'EOF'
            set -euo pipefail
            for i in $(seq 1 30); do
              if docker run --rm --network vibes_net busybox:1.37 \
                   wget -qO- http://ots-app:3000/ >/dev/null 2>&1; then
                echo "ots healthy on attempt $i"
                exit 0
              fi
              echo "attempt $i: not ready, retrying in 2s..."
              sleep 2
            done
            echo "ots never responded on :3000" >&2
            cd /opt/vibes/ots
            docker compose ps
            docker compose logs --tail 80 >&2
            exit 1
          EOF

      - name: Prune unused images
        continue-on-error: true
        uses: ./.github/actions/prune-images
        with:
          deploy-host: ${{ secrets.DEPLOY_HOST }}
