name: Redeploy app at tag

# Manual: bump IMAGE_TAG in /opt/vibes/<app>/.env and restart. .env not regenerated.
# Use for rollback to an old sha without rebuilding.

on:
  workflow_dispatch:
    inputs:
      app:
        required: true
        type: string
        description: "App slug (e.g. voice-hub)."
      image_tag:
        required: true
        type: string
        description: "Image tag to switch to."

concurrency:
  group: deploy-${{ inputs.app }}
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY"  > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_HOST_KEY" > ~/.ssh/known_hosts

      - name: Update IMAGE_TAG and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          APP:         ${{ inputs.app }}
          IMAGE_TAG:   ${{ inputs.image_tag }}
        run: |
          ssh "deploy@$DEPLOY_HOST" '
            set -e
            APP='"$APP"'
            TAG='"$IMAGE_TAG"'
            cd /opt/vibes/$APP
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$TAG|" .env
            grep -q "^IMAGE_TAG=" .env || echo "IMAGE_TAG=$TAG" >> .env
            docker compose pull
            docker compose up -d --remove-orphans
          '
