name: Deploy system config

on:
  push:
    branches: [master]
    paths:
      - 'system/**'
      - 'scripts/install-system-config.sh'
      - 'scripts/reboot-if-idle.sh'
      - 'scripts/test-install-system-config.sh'
      - 'scripts/test-reboot-if-idle.sh'
      - '.github/workflows/system-config.yml'
  workflow_dispatch:

concurrency:
  group: deploy-system-config
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Test system config
        run: |
          set -euo pipefail
          scripts/test-install-system-config.sh
          scripts/test-reboot-if-idle.sh
          sh -n scripts/bootstrap.sh scripts/install-system-config.sh scripts/reboot-if-idle.sh

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          host-key: ${{ secrets.DEPLOY_HOST_KEY }}

      - name: Stage system config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          tar -czf system-config.tar.gz scripts/install-system-config.sh scripts/reboot-if-idle.sh system
          scp system-config.tar.gz "deploy@$DEPLOY_HOST:/opt/vibes/system-config-$REVISION.tar.gz"
          ssh "deploy@$DEPLOY_HOST" REVISION="$REVISION" bash -s <<'EOF'
            set -euo pipefail
            test "${#REVISION}" -eq 40
            case "$REVISION" in *[!0-9a-f]*) exit 2 ;; esac
            release="/opt/vibes/system-config/$REVISION"
            archive="/opt/vibes/system-config-$REVISION.tar.gz"
            trap 'rm -rf "$release" "$archive"' EXIT
            mkdir -p "$release"
            tar -xzf "$archive" -C "$release"
            sudo -n /usr/local/sbin/vibes-install-system-config "$release"
          EOF

      - name: Verify production state
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          ssh "deploy@$DEPLOY_HOST" bash -s <<'EOF'
            set -euo pipefail
            systemctl is-enabled --quiet vibes-reboot-if-idle.timer
            systemctl is-active --quiet vibes-reboot-if-idle.timer
            set +e
            /usr/local/sbin/vibes-reboot-if-idle --check
            status=$?
            set -e
            test "$status" -eq 0 -o "$status" -eq 2
          EOF
