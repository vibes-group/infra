name: Test system config

on:
  push:
    branches: [master]
    paths:
      - 'system/**'
      - 'scripts/install-system-config.sh'
      - 'scripts/reboot-if-idle.sh'
      - 'scripts/test-install-system-config.sh'
      - 'scripts/test-reboot-if-idle.sh'
      - '.github/workflows/system-config.yml'
  workflow_dispatch:

concurrency:
  group: test-system-config
  cancel-in-progress: false

# System config is root-owned and applied out of band by re-running bootstrap
# over the key-only root SSH — never by CI. This job only validates it.
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Test system config
        run: |
          set -euo pipefail
          scripts/test-install-system-config.sh
          scripts/test-reboot-if-idle.sh
          sh -n scripts/bootstrap.sh scripts/install-system-config.sh scripts/reboot-if-idle.sh
