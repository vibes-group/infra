name: message-hub

networks:
  default:
    name: vibes_net
    external: true

services:
  message-hub-data-init:
    image: busybox:1.37
    command: ["sh", "-c", "mkdir -p /data && chown -R 10001:10001 /data"]
    volumes:
      - ./data:/data
    restart: "no"

  message-hub-app:
    image: ghcr.io/vibes-group/message-hub-app:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    depends_on:
      message-hub-data-init:
        condition: service_completed_successfully
    environment:
      APP_ADDR: ":8080"
      APP_DB_PATH: /data/message-hub.db
      TURN_PUBLIC_IP: "${PUBLIC_IP:?PUBLIC_IP is required}"
      TURN_PUBLIC_PORT: "${TURN_PUBLIC_PORT:-3479}"
      TURN_LISTEN_ADDR: "0.0.0.0:${TURN_PUBLIC_PORT:-3479}"
      TURN_REALM: "${APP_HOSTNAME:?APP_HOSTNAME is required}"
      TURN_RELAY_PORT_MIN: "${TURN_RELAY_PORT_MIN:-49200}"
      TURN_RELAY_PORT_MAX: "${TURN_RELAY_PORT_MAX:-49239}"
    expose:
      - "8080"
    ports:
      - "${TURN_PUBLIC_PORT:-3479}:${TURN_PUBLIC_PORT:-3479}/udp"
      - "${TURN_RELAY_PORT_MIN:-49200}-${TURN_RELAY_PORT_MAX:-49239}:${TURN_RELAY_PORT_MIN:-49200}-${TURN_RELAY_PORT_MAX:-49239}/udp"
    volumes:
      - ./data:/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
