name: message-hub

networks:
  default:
    name: vibes_net
    external: true

services:
  message-hub-app:
    image: ghcr.io/vibes-group/message-hub-app:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    environment:
      APP_ADDR: ":8080"
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
