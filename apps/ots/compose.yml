name: ots

networks:
  default:
    name: ${VIBES_NETWORK_NAME:-vibes_net}
    external: true
  storage:
    internal: true

services:
  ots-redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - ""
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - noeviction
    mem_limit: 96m
    mem_reservation: 16m
    networks:
      - storage
    volumes:
      - ${OTS_DATA_DIR:-./data}:/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ots-app:
    image: ghcr.io/luzifer/ots:v1.21.8
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    expose:
      - "3000"
    networks:
      - default
      - storage
    depends_on:
      ots-redis:
        condition: service_healthy
    environment:
      STORAGE_TYPE: redis
      REDIS_URL: redis://ots-redis:6379/0
      SECRET_EXPIRY: "604800"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
