name: vibes-caddy

networks:
  default:
    name: vibes_net
    external: true

services:
  caddy:
    image: caddy:2.11-alpine
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    environment:
      VOICE_HUB_HOST: "${VOICE_HUB_HOST:?VOICE_HUB_HOST is required}"
      VOICE_HUB_HOST_ALIAS: "${VOICE_HUB_HOST_ALIAS:?VOICE_HUB_HOST_ALIAS is required}"
      MESSAGE_HUB_HOST: "${MESSAGE_HUB_HOST:?MESSAGE_HUB_HOST is required}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - /opt/vibes/web:/srv/web:ro
    security_opt:
      - no-new-privileges:true
